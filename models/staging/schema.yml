version: 2

models:
  - name: stg_orders
    description: Pedidos estandarizados a partir de la seed raw.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: stg_customers
    description: Clientes estandarizados a partir de la seed raw.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
