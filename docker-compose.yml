services:
  postgres:
    image: postgres:16-bullseye
    container_name: dbt-training-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dbt_training}
      POSTGRES_USER: ${POSTGRES_USER:-dbt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbt} -d ${POSTGRES_DB:-dbt_training}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
